services:
  db_mongo:
    build: ./mongo
    container_name: db_mongo
    restart: "on-failure"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.getSiblingDB('blog_db').posts.countDocuments() === 5 ? quit(0) : quit(1)\""]
      interval: 10s
      retries: 5

  db_mysql:
    image: mysql:9.6
    container_name: db_mysql
    restart: "on-failure"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -p$$MYSQL_ROOT_PASSWORD -e 'SELECT COUNT(*) FROM utilisateurs' $$MYSQL_DATABASE | grep 4"]
      interval: 10s
      retries: 5

  api:
    build: ./api
    container_name: api_fastapi
    restart: "on-failure"
    depends_on:
      db_mongo:
        condition: service_healthy
      db_mysql:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - backend

  admin_mongo:
    image: mongo-express
    container_name: admin_mongo
    restart: "on-failure"
    depends_on:
      db_mongo:
        condition: service_healthy
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USER}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASSWORD}
      - ME_CONFIG_MONGODB_SERVER=db_mongo
    ports:
      - "8081:8081"
    networks:
      - backend

  admin_mysql:
    image: adminer
    container_name: admin_mysql
    restart: "on-failure"
    depends_on:
      db_mysql:
        condition: service_healthy
    ports:
      - "8082:8080"
    networks:
      - backend

networks:
  backend: {}

volumes:
  mongo_data: {}
  mysql_data: {}